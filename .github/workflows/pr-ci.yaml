name: PR Build Check

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs when a new workflow with the same group name is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Checkout parent-pom
        uses: actions/checkout@v4
        with:
          repository: hvantran/parent-pom
          path: parent-pom
          token: ${{ secrets.ACCESS_TOKEN }}
      
      - name: Checkout base-platform
        uses: actions/checkout@v4
        with:
          repository: hvantran/base-platform
          path: base-platform
          token: ${{ secrets.ACCESS_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Build parent-pom
        run: mvn clean install -f parent-pom/pom.xml -DskipTests
      
      - name: Build base-platform
        run: mvn clean install -f base-platform/pom.xml -DskipTests -Ddockerfile.skip=true
      
      - name: Build spring-kafka-notifier
        run: mvn clean verify -B -Ddockerfile.skip=true
      
      - name: Run tests
        run: mvn test -B
